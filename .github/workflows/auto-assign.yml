name: Auto Assign PR
on:
  pull_request:
    types: [opened]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Assign PR to author or code owners
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ORG="${{ github.repository_owner }}"
          if gh api "orgs/${ORG}/members/${AUTHOR}" --silent 2>/dev/null; then
            gh pr edit ${{ github.event.pull_request.number }} --add-assignee "${AUTHOR}"
          else
            echo "${AUTHOR} is not a member of ${ORG}, assigning code owners"
            gh pr edit ${{ github.event.pull_request.number }} --add-assignee rhysfaultless-cpr,jhiggins-cpr,tonybaltovski,luis-camero
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
